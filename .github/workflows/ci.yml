name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      # `build` runs tsc per workspace, so it doubles as the typecheck.
      - run: npm run build

  # Deployment is handled by Render: the Soarscore_Preview service auto-deploys
  # from the Dockerfile on every push to master, so no deploy job lives here.
